services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brawl_grade_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: ["node", "dist/db/migrate.js"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/brawl_grade_bot
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/brawl_grade_bot
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
